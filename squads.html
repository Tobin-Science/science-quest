<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Points — Free Team Points Tracker for Teachers</title>
<meta name="description" content="Free classroom team points tracker. Organize students into squads, award points in three taps, run live leaderboards with daily, weekly, and all-time records — no accounts, all data stays on your device.">
<meta property="og:title" content="Squad Points — Free Team Points Tracker for Teachers">
<meta property="og:description" content="Organize students into squads, award points in three taps, and run leaderboards with daily, weekly, and all-time records. Free, no accounts.">
<meta property="og:image" content="https://tobinscience.com/squad-points-og.jpg">
<meta property="og:url" content="https://tobinscience.com/squads.html">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  :root{ --ink:#182135; --mut:#5f6b83; --bg:#f2f4fb; --card:#fff; --brand:#5b5bd6; --brand2:#4640c9;
         --grad:linear-gradient(135deg,#6366f1,#8b5cf6); --green:#16a34a;
         --green-grad:linear-gradient(160deg,#22c55e,#15803d); --gold:#f59e0b; --line:#e4e8f4; --danger:#dc2626;
         --shadow:0 2px 10px rgba(23,32,64,.07); --shadow-lift:0 12px 26px rgba(23,32,64,.14); }
  *{box-sizing:border-box} html,body{height:100%}
  body{font-family:system-ui,"Segoe UI",Arial,sans-serif;color:var(--ink);margin:0;
       background:radial-gradient(1100px 420px at 50% -140px,#e4e7ff 0%,rgba(228,231,255,0) 62%),var(--bg);
       display:flex;flex-direction:column;min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  .muted{color:var(--mut)} .hidden{display:none!important}

  /* header */
  header{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
         padding:.6rem 1.1rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  header h1{font-size:1.18rem;margin:0;display:flex;align-items:center;gap:.55rem;letter-spacing:-.2px}
  .logo{width:36px;height:36px;border-radius:11px;background:var(--grad);display:grid;place-items:center;
        font-size:19px;box-shadow:0 4px 10px rgba(99,102,241,.35)}
  .qlabel{background:#eceeff;color:var(--brand2);border-radius:999px;padding:.22rem .8rem;font-weight:700;font-size:.85rem}
  .spacer{flex:1}
  .hbtn{background:#fff;border:1px solid var(--line);border-radius:999px;padding:.45rem .9rem;font-size:.9rem;
        color:var(--ink);box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;
        display:inline-flex;align-items:center;gap:.4rem}
  .hbtn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift)}
  .hbtn.primary{background:var(--grad);border-color:transparent;color:#fff}

  /* period tabs */
  nav.tabs{display:flex;gap:.45rem;padding:.8rem 1rem .1rem;overflow-x:auto;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{border:0;background:#e7eaf7;padding:.5rem 1.1rem;border-radius:999px;font-size:.93rem;
                  font-weight:700;color:var(--mut);white-space:nowrap;transition:background .15s,color .15s}
  nav.tabs button:hover{background:#dde1f3}
  nav.tabs button.on{background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35)}
  nav.tabs button.addtab{background:transparent;border:2px dashed #c2c9e6;color:var(--brand2);padding:.4rem 1rem}

  /* main grid */
  main{flex:1;padding:1rem 1rem 108px;max-width:1180px;width:100%;margin:0 auto}
  .banner{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--gold);border-radius:13px;
          padding:.6rem .95rem;margin-bottom:.7rem;font-size:.95rem;display:flex;gap:.5rem;align-items:center;
          flex-wrap:wrap;box-shadow:var(--shadow)}
  .goalwrap{margin:.1rem 0 1rem}
  .goalbar{height:14px;background:#e0e4f4;border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(23,32,64,.12)}
  .goalbar>div{height:100%;background:var(--green-grad);border-radius:999px;transition:width .6s}
  .goaltext{font-size:.8rem;color:var(--mut);margin-top:.3rem;font-weight:600}
  .gridtools{display:flex;align-items:center;gap:.6rem;margin:.2rem 0 .4rem;flex-wrap:wrap}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.05rem;padding-top:14px}
  .sq{background:var(--card);border-radius:18px;padding:1.05rem .9rem .95rem;position:relative;text-align:center;
      border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer;transition:transform .13s,box-shadow .13s}
  .sq:hover{transform:translateY(-4px);box-shadow:var(--shadow-lift)}
  .sq.r1{border-color:#f3ce6d;box-shadow:0 4px 18px rgba(245,158,11,.22)}
  .sq.r2{border-color:#c9d1de}
  .sq.r3{border-color:#e5b48b}
  .sq .pts{position:absolute;top:-13px;right:-9px;background:var(--green-grad);color:#fff;border-radius:999px;
           min-width:46px;padding:.34rem .55rem;font-weight:800;font-size:1.02rem;border:3px solid #fff;
           box-shadow:0 3px 9px rgba(0,0,0,.22)}
  .sq .pts.bump{animation:bump .5s}
  @keyframes bump{30%{transform:scale(1.35)}}
  .sq .avatar{width:88px;height:88px;margin:0 auto .45rem;border-radius:16px;overflow:hidden;background:#f3f5fd;
              border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .sq .avatar img,.sq .avatar svg{width:100%;height:100%;object-fit:contain}
  .sq .nm{font-weight:700;font-size:1rem;line-height:1.25;overflow:hidden;display:-webkit-box;
          -webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:2.5em}
  .sq .meta{margin-top:.4rem;font-size:.76rem;color:var(--mut);display:flex;justify-content:center;gap:.35rem;flex-wrap:wrap}
  .sq .meta span{background:#f1f3fb;border-radius:999px;padding:.18rem .55rem;font-weight:600}
  .ic{vertical-align:-3px;flex:none}
  .rk{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:999px;font-weight:800;
      color:#fff;font-size:.78rem;background:#a7b1c7}
  .rk1{background:linear-gradient(160deg,#f7c948,#d99a06)}
  .rk2{background:linear-gradient(160deg,#cfd8e3,#8fa0b8)}
  .rk3{background:linear-gradient(160deg,#e6ac7c,#b06a35)}
  .rkn{display:inline-grid;place-items:center;width:24px;height:24px;font-weight:700;color:var(--mut)}
  .sq .rk{position:absolute;top:-12px;left:-8px;width:30px;height:30px;border:3px solid #fff;
          box-shadow:0 2px 7px rgba(0,0,0,.22);font-size:.9rem}
  .sq .flame{position:absolute;top:34px;right:6px;font-size:.72rem;font-weight:800;color:#b45309;
             background:#fff3e2;border:1px solid #f7c990;border-radius:999px;padding:.15rem .5rem .15rem .3rem;
             display:flex;align-items:center;gap:.12rem}
  .sq .bdg{display:flex;justify-content:center;gap:.28rem;margin-top:.36rem;min-height:24px;flex-wrap:wrap}
  .bdgc{width:23px;height:23px;border-radius:999px;display:grid;place-items:center;background:#eef0fa;
        color:var(--brand2);border:1px solid var(--line);font-size:.5rem;font-weight:800}
  .sq.add{border:2px dashed #c2c9e6;background:rgba(255,255,255,.5);box-shadow:none;display:flex;align-items:center;
          justify-content:center;color:var(--brand2);font-weight:700;min-height:196px}
  .sq.add:hover{background:#fff;transform:none}
  .empty{max-width:560px;margin:2.2rem auto;text-align:center;background:var(--card);border-radius:20px;
         padding:1.6rem 2rem 2.2rem;border:1px solid var(--line);box-shadow:var(--shadow)}
  .empty h2{margin-top:.4rem}
  .empty .hero{width:100%;max-width:400px;height:auto;border-radius:14px}

  /* floating toolbar */
  .toolbar{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;background:rgba(255,255,255,.94);
           backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;display:flex;gap:.15rem;
           padding:.35rem .45rem;z-index:30;box-shadow:var(--shadow-lift);max-width:calc(100vw - 16px)}
  .toolbar button{background:transparent;border:0;border-radius:999px;padding:.55rem .8rem;font-size:.9rem;
                  color:var(--ink);white-space:nowrap;font-weight:600;display:inline-flex;align-items:center;gap:.45rem}
  .toolbar button:hover{background:#eef0fa}

  /* overlays & modals */
  .ovl{position:fixed;inset:0;background:rgba(18,24,44,.55);z-index:50;display:flex;align-items:center;
       justify-content:center;padding:1rem;overflow:auto}
  .panel{background:var(--card);border-radius:20px;max-width:760px;width:100%;max-height:92vh;overflow:auto;
         padding:1.4rem;position:relative;box-shadow:0 24px 60px rgba(12,18,40,.35)}
  .panel h2{margin:.1rem 0 .9rem;font-size:1.3rem;letter-spacing:-.2px;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;padding-right:2.2rem}
  .panel h3{margin:1.25rem 0 .5rem;font-size:1rem;border-top:1px solid var(--line);padding-top:1.05rem}
  .panel h3:first-of-type{border-top:0;padding-top:0}
  .x{position:absolute;top:.75rem;right:.85rem;border:0;background:#eef0f8;border-radius:999px;width:36px;height:36px;font-size:1rem}
  .x:hover{background:#e2e5f2}
  .row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin:.35rem 0}
  .btn{background:var(--grad);color:#fff;border:0;border-radius:10px;padding:.55rem 1.05rem;font-size:.95rem;
       font-weight:600;box-shadow:0 3px 9px rgba(99,102,241,.3);display:inline-flex;align-items:center;gap:.4rem}
  .btn.gray{background:#eef0f8;color:var(--ink);box-shadow:none} .btn.red{background:var(--danger);box-shadow:none}
  .btn.sm{padding:.38rem .7rem;font-size:.84rem;border-radius:8px}
  .btn:disabled{opacity:.45;cursor:default}
  input[type=text],input[type=number],textarea,select{font-family:inherit;font-size:.95rem;border:1px solid #c6cde6;
       border-radius:9px;padding:.5rem .65rem;background:#fff;color:var(--ink)}
  input:focus,textarea:focus{outline:2px solid #b9bcf5;outline-offset:0}
  textarea{width:100%;min-height:110px}
  .chip{display:inline-flex;align-items:center;gap:.3rem;background:#eef0f8;border-radius:999px;
        padding:.28rem .75rem;font-size:.85rem;margin:.15rem;font-weight:600}
  .chip button{border:0;background:transparent;font-size:.8rem;color:var(--mut)}
  .chip.off{opacity:.45;text-decoration:line-through}

  /* award modal */
  .award .nums{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1rem 0}
  .award .nums button{font-size:2.1rem;font-weight:800;padding:1.1rem 0;border-radius:16px;border:0;
        background:var(--grad);color:#fff;box-shadow:0 4px 0 #4338ca;transition:transform .08s}
  .award .nums button:hover{filter:brightness(1.07)}
  .award .nums button:active{transform:translateY(3px);box-shadow:0 1px 0 #4338ca}
  .award .nums button.custom{background:linear-gradient(135deg,#f6b73c,#f59e0b);box-shadow:0 4px 0 #b45309;font-size:1.15rem;letter-spacing:.02em}

  /* randomizer */
  .rand{ text-align:center }
  .rand .big{font-size:clamp(2rem,7vw,3.6rem);font-weight:900;min-height:1.4em;margin:1.4rem 0;color:var(--brand2);letter-spacing:-.5px}
  .rand .big.landed{animation:pop .45s}
  @keyframes pop{40%{transform:scale(1.18)}}

  /* standings */
  .stTabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
  .stTabs button{border:1px solid var(--line);background:#f2f4fd;border-radius:999px;padding:.42rem 1rem;font-size:.9rem;font-weight:600}
  .stTabs button.on{background:var(--grad);border-color:transparent;color:#fff}
  table.lb{width:100%;border-collapse:collapse;font-size:.95rem;background:var(--card);border:1px solid var(--line);
           border-radius:12px;overflow:hidden}
  table.lb th{background:#f6f7fd;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)}
  table.lb td,table.lb th{padding:.55rem .6rem;text-align:left;border-bottom:1px solid var(--line)}
  table.lb tr:last-child td{border-bottom:0}
  table.lb td.r{text-align:right;font-weight:800}
  .rec{background:linear-gradient(90deg,#fff8e6,#fff);border:1px solid #f3e2ac;border-radius:12px;
       padding:.65rem .9rem;margin-bottom:.8rem;font-size:.95rem}

  /* undo pill */
  #undoPill{position:fixed;left:50%;transform:translateX(-50%);bottom:82px;background:#182135;color:#fff;
    border-radius:999px;padding:.55rem .6rem .55rem 1.15rem;display:flex;gap:.7rem;align-items:center;z-index:60;
    box-shadow:0 6px 18px rgba(0,0,0,.35);font-size:.92rem}
  #undoPill button{background:#fff;color:#182135;border:0;border-radius:999px;padding:.35rem .95rem;font-weight:800}

  /* projector */
  .proj{position:fixed;inset:0;background:radial-gradient(1000px 500px at 50% -8%,#26305c,#121831);color:#fff;
        z-index:80;padding:2.2rem;overflow:auto}
  .proj h1{font-size:2.1rem;margin:0 0 1.5rem;display:flex;gap:1rem;align-items:baseline;letter-spacing:-.4px}
  .proj .grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .proj .sq{background:#1e2749;border-color:#2c3767;color:#fff;cursor:default}
  .proj .sq:hover{transform:none;box-shadow:var(--shadow)}
  .proj .sq .nm{color:#fff} .proj .sq .meta span{background:#273156;color:#a3aed0}
  .proj .first{outline:3px solid var(--gold);box-shadow:0 0 26px rgba(245,158,11,.5)}
  .proj .exit{position:fixed;top:1rem;right:1rem;background:rgba(255,255,255,.14);color:#fff;border:0;border-radius:10px;padding:.5rem .95rem}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:100}
  footer{padding:.7rem 1rem 86px;text-align:center}
  footer a{color:var(--brand2);font-size:.85rem;text-decoration:none;background:#fff;border:1px solid var(--line);
           border-radius:999px;padding:.38rem .95rem .38rem .5rem;display:inline-flex;align-items:center;gap:.5rem;box-shadow:var(--shadow)}
  .flogo{width:22px;height:22px;border-radius:50%;display:block}
  @media (max-width:700px){
    .toolbar button span{display:none}
    .toolbar button{font-size:1.15rem;padding:.5rem .62rem}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.85rem}
    main{padding:.75rem .65rem 96px}
    .sq .avatar{width:70px;height:70px}
  }
</style>

<body>
<header>
  <h1><span class="logo" data-ic="trophy" data-ic-size="20"></span> Squad Points</h1>
  <span class="qlabel" id="qLabel">Q1</span>
  <span class="spacer"></span>
  <button class="hbtn" id="btnStandings2" data-ic="trophy">Standings</button>
  <button class="hbtn" id="btnSetup2" data-ic="gear">Setup</button>
</header>
<nav class="tabs" id="tabs"></nav>
<main id="main"></main>
<div class="toolbar" id="toolbar">
  <button data-act="random" title="Random Student" data-ic="dice"><span>Random Student</span></button>
  <button data-act="randomsquad" title="Random Squad" data-ic="shuffle"><span>Random Squad</span></button>
  <button data-act="standings" title="Standings" data-ic="trophy"><span>Standings</span></button>
  <button data-act="share" title="Share standings" data-ic="share"><span>Share</span></button>
  <button data-act="projector" title="Projector mode" data-ic="monitor"><span>Projector</span></button>
  <button data-act="timer" title="Timer" data-ic="clock"><span>Timer</span></button>
  <button data-act="setup" title="Setup" data-ic="gear"><span>Setup</span></button>
</div>
<footer><a href="https://tobinscience.com" target="_blank" rel="noopener"><img class="flogo" src="/favicon.png" alt="Tobin Science logo">Find more great resources at TobinScience.com →</a></footer>
<div id="overlays"></div>
<div id="undoHost"></div>
<canvas id="confetti"></canvas>

<script>
/*==CORE-START==*/
"use strict";
const SP = (() => {

  // ---------- ids / storage ----------
  let _uidc = 0;
  const uid = (p) => p + (++_uidc).toString(36) + Math.random().toString(36).slice(2, 8);
  const STORE_KEY = "squadPoints.v1";
  const save = (state) => { if (typeof localStorage !== "undefined") localStorage.setItem(STORE_KEY, JSON.stringify(state)); };
  const load = () => {
    if (typeof localStorage === "undefined") return null;
    try { const raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
    catch { return null; }
  };

  // ---------- state ----------
  const AV_COUNT = 20; // built-in avatar pack size (art ships in a later chunk)
  function newState(now) {
    return {
      settings: { soundOn: true, confettiOn: true, schoolYearLabel: "", lastBackupAt: null },
      periods: [], students: [],
      quarters: [{ id: uid("q"), label: "Q1", startedAt: now, endedAt: null }],
      squads: [], awards: [],
      pickerState: {}, goals: {}
    };
  }
  const currentQuarter = (st) => st.quarters.find(q => q.endedAt === null);

  // ---------- periods / roster ----------
  function addPeriod(st, name) {
    const p = { id: uid("p"), name: String(name).trim(), order: st.periods.length, emoji: "" };
    st.periods.push(p); return p;
  }
  function renamePeriod(st, periodId, name) {
    const p = st.periods.find(x => x.id === periodId); if (p) p.name = String(name).trim();
  }
  function parseRoster(text) {
    const out = [], seen = new Set();
    for (const rawLine of String(text).split(/\r?\n/)) {
      const cells = rawLine.includes("\t") ? rawLine.split("\t") : [rawLine];
      for (let cell of cells) {
        cell = cell.replace(/^\s*\d+\s*[.)\-:]?\s*/, "").trim();   // strip "1." / "2)" numbering
        if (!cell) continue;
        const m = cell.match(/^([^,]+),\s*([^,]+)$/);              // "Last, First" -> "First Last"
        if (m) cell = m[2].trim() + " " + m[1].trim();
        cell = cell.replace(/\s+/g, " ");
        const key = cell.toLowerCase();
        if (!/[a-z]/i.test(cell)) continue;                        // must contain a letter
        if (!seen.has(key)) { seen.add(key); out.push(cell); }
      }
    }
    return out;
  }
  function addStudents(st, periodId, names) {
    const existing = new Set(st.students.filter(s => s.periodId === periodId && s.active).map(s => s.name.toLowerCase()));
    const added = [], skipped = [];
    for (const n of names) {
      if (existing.has(n.toLowerCase())) { skipped.push(n); continue; }
      existing.add(n.toLowerCase());
      const s = { id: uid("s"), periodId, name: n, active: true };
      st.students.push(s); added.push(s);
    }
    return { added, skipped };
  }

  // ---------- quarters / squads ----------
  function startQuarter(st, label, now) {
    const open = currentQuarter(st);
    if (open) open.endedAt = now;
    const q = { id: uid("q"), label: String(label).trim(), startedAt: now, endedAt: null };
    st.quarters.push(q); return q;
  }
  function addSquad(st, periodId, name) {
    const q = currentQuarter(st);
    const sq = { id: uid("g"), periodId, quarterId: q.id, name: String(name).trim(),
                 imageKey: null, builtinAvatar: 0, memberIds: [] };
    st.squads.push(sq); return sq;
  }
  function renameSquad(st, squadId, name) {
    const sq = st.squads.find(x => x.id === squadId); if (sq) sq.name = String(name).trim();
  }
  function setSquadAvatar(st, squadId, avatarIndex) {
    const sq = st.squads.find(x => x.id === squadId);
    if (sq) sq.builtinAvatar = Math.max(0, Math.min(AV_COUNT - 1, avatarIndex | 0));
  }
  function assignStudent(st, squadId, studentId) {
    const sq = st.squads.find(x => x.id === squadId); if (!sq) return;
    // a student belongs to at most one squad per quarter
    for (const other of st.squads) {
      if (other.quarterId === sq.quarterId) other.memberIds = other.memberIds.filter(id => id !== studentId);
    }
    sq.memberIds.push(studentId);
  }
  function unassignStudent(st, squadId, studentId) {
    const sq = st.squads.find(x => x.id === squadId);
    if (sq) sq.memberIds = sq.memberIds.filter(id => id !== studentId);
  }
  const currentSquads = (st, periodId) => {
    const q = currentQuarter(st);
    return st.squads.filter(g => g.quarterId === q.id && (periodId == null || g.periodId === periodId));
  };

  // ---------- awards ledger (append-only; undo deletes a row) ----------
  function award(st, squadId, points, now, note) {
    const p = Number(points);
    if (!Number.isInteger(p) || p < 1) throw new Error("Points must be a whole number of 1 or more.");
    if (!st.squads.some(g => g.id === squadId)) throw new Error("Unknown squad.");
    const a = { id: uid("a"), squadId, points: p, ts: now, note: note || null };
    st.awards.push(a); return a;
  }
  function undoAward(st, awardId) {
    const i = st.awards.findIndex(a => a.id === awardId);
    if (i >= 0) st.awards.splice(i, 1);
    return i >= 0;
  }

  // ---------- time helpers (device-local) ----------
  function dayKey(ts) {
    const d = new Date(ts);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function weekStart(ts) { // Monday 00:00 local
    const d = new Date(ts);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    return d.getTime();
  }

  // ---------- derived stats (everything computes from the ledger) ----------
  const _awardsOf = (st, squadId) => st.awards.filter(a => a.squadId === squadId);
  const squadTotal  = (st, id) => _awardsOf(st, id).reduce((t, a) => t + a.points, 0);
  const squadDaily  = (st, id, now) => _awardsOf(st, id).filter(a => dayKey(a.ts) === dayKey(now)).reduce((t, a) => t + a.points, 0);
  const squadWeekly = (st, id, now) => {
    const ws = weekStart(now), we = ws + 7 * 864e5;
    return _awardsOf(st, id).filter(a => a.ts >= ws && a.ts < we).reduce((t, a) => t + a.points, 0);
  };

  function streak(st, squadId, now) {
    // consecutive CLASS days (days when any squad in this period earned points) where this squad also earned
    const sq = st.squads.find(g => g.id === squadId); if (!sq) return 0;
    const mates = st.squads.filter(g => g.periodId === sq.periodId && g.quarterId === sq.quarterId).map(g => g.id);
    const upTo = st.awards.filter(a => a.ts <= now); // "as of now" — later awards can't rewrite history
    const classDays = [...new Set(upTo.filter(a => mates.includes(a.squadId)).map(a => dayKey(a.ts)))].sort();
    const mine = new Set(upTo.filter(a => a.squadId === squadId).map(a => dayKey(a.ts)));
    let n = 0;
    for (let i = classDays.length - 1; i >= 0; i--) { if (mine.has(classDays[i])) n++; else break; }
    return n;
  }

  function _rank(rows, key) { // ties share a rank: rank = 1 + count strictly greater
    for (const r of rows) r.rank = 1 + rows.filter(x => x[key] > r[key]).length;
    return rows;
  }

  function periodStandings(st, periodId, now) {
    const rows = currentSquads(st, periodId).map(sq => ({
      squad: sq, name: sq.name, total: squadTotal(st, sq.id),
      daily: squadDaily(st, sq.id, now), weekly: squadWeekly(st, sq.id, now),
      streak: streak(st, sq.id, now), badges: badges(st, sq.id, now)
    }));
    rows.sort((a, b) => b.total - a.total || a.name.localeCompare(b.name));
    return _rank(rows, "total");
  }

  function quarterChampion(st, now) {
    let best = null;
    for (const p of st.periods) for (const r of periodStandings(st, p.id, now)) {
      if (r.total > 0 && (!best || r.total > best.total)) best = { name: r.name, period: p.name, total: r.total };
    }
    return best;
  }

  function allTimeTop10(st) {
    const rows = st.squads.map(sq => {
      const q = st.quarters.find(x => x.id === sq.quarterId);
      const p = st.periods.find(x => x.id === sq.periodId);
      return { name: sq.name, period: p ? p.name : "?", quarter: q ? q.label : "?", total: squadTotal(st, sq.id) };
    }).filter(r => r.total > 0);
    rows.sort((a, b) => b.total - a.total || a.name.localeCompare(b.name));
    return rows.slice(0, 10);
  }

  function weeklyRace(st, now) {
    const rows = [];
    for (const p of st.periods) for (const sq of currentSquads(st, p.id)) {
      const w = squadWeekly(st, sq.id, now);
      if (w > 0) rows.push({ name: sq.name, period: p.name, weekly: w });
    }
    rows.sort((a, b) => b.weekly - a.weekly || a.name.localeCompare(b.name));
    return rows;
  }

  function squadOfWeek(st, periodId, now) { // last week's top weekly squad in this period
    const ws = weekStart(now), prev = ws - 7 * 864e5;
    let best = null;
    for (const sq of currentSquads(st, periodId)) {
      const pts = _awardsOf(st, sq.id).filter(a => a.ts >= prev && a.ts < ws).reduce((t, a) => t + a.points, 0);
      if (pts > 0 && (!best || pts > best.points)) best = { name: sq.name, points: pts };
    }
    return best;
  }

  // ---------- badges ----------
  const BADGES = {
    first_points:  { icon: "star",   label: "First Points",   desc: "Earned the squad's first points" },
    club100:       { icon: "100",    label: "Century Club",   desc: "Reached 100 points in a quarter" },
    club250:       { icon: "rocket", label: "250 Club",       desc: "Reached 250 points in a quarter" },
    club500:       { icon: "crown",  label: "500 Club",       desc: "Reached 500 points in a quarter" },
    hot_streak:    { icon: "flame",  label: "Hot Streak",     desc: "Earned points 5 class days in a row" },
    daily_double:  { icon: "bolt",   label: "Daily Double",   desc: "Top daily squad twice in one week" },
    comeback:      { icon: "trend",  label: "Comeback",       desc: "From last place to top 3 in one week" },
    record_breaker:{ icon: "medal",  label: "Record Breakers",desc: "Set a new all-time record" }
  };

  function badges(st, squadId, now) {
    const out = [];
    const total = squadTotal(st, squadId);
    if (total >= 1) out.push("first_points");
    if (total >= 100) out.push("club100");
    if (total >= 250) out.push("club250");
    if (total >= 500) out.push("club500");
    if (streak(st, squadId, now) >= 5) out.push("hot_streak");

    const sq = st.squads.find(g => g.id === squadId);
    const mates = st.squads.filter(g => g.periodId === sq.periodId && g.quarterId === sq.quarterId);

    // daily double: strictly-top daily scorer in its period on 2+ days of the same Mon–Sun week (any week)
    const byWeekWins = {};
    const days = [...new Set(st.awards.filter(a => mates.some(m => m.id === a.squadId)).map(a => dayKey(a.ts)))];
    for (const day of days) {
      const scores = mates.map(m => ({ id: m.id, pts: st.awards.filter(a => a.squadId === m.id && dayKey(a.ts) === day).reduce((t, a) => t + a.points, 0) }));
      const top = Math.max(...scores.map(s => s.pts));
      const winners = scores.filter(s => s.pts === top && top > 0);
      if (winners.length === 1 && winners[0].id === squadId) {
        const wk = weekStart(st.awards.find(a => dayKey(a.ts) === day && mates.some(m => m.id === a.squadId)).ts);
        byWeekWins[wk] = (byWeekWins[wk] || 0) + 1;
      }
    }
    if (Object.values(byWeekWins).some(n => n >= 2)) out.push("daily_double");

    // comeback: strictly last at start of this week (4+ squads, had a real deficit) and top 3 now
    if (mates.length >= 4) {
      const ws = weekStart(now);
      const prevTotals = mates.map(m => ({ id: m.id, pts: st.awards.filter(a => a.squadId === m.id && a.ts < ws).reduce((t, a) => t + a.points, 0) }));
      const minPts = Math.min(...prevTotals.map(x => x.pts)), maxPts = Math.max(...prevTotals.map(x => x.pts));
      const lastOnes = prevTotals.filter(x => x.pts === minPts);
      if (maxPts > minPts && lastOnes.length === 1 && lastOnes[0].id === squadId) {
        const nowRows = mates.map(m => ({ id: m.id, pts: squadTotal(st, m.id) })).sort((a, b) => b.pts - a.pts);
        const rank = 1 + nowRows.filter(x => x.pts > squadTotal(st, squadId)).length;
        if (rank <= 3) out.push("comeback");
      }
    }

    // record breaker: beat the best total ever posted by any OTHER (squad, quarter) pair
    const otherBest = Math.max(0, ...st.squads.filter(g => g.id !== squadId).map(g => squadTotal(st, g.id)));
    if (otherBest > 0 && total > otherBest) out.push("record_breaker");

    return out;
  }

  // ---------- random picker ----------
  function pickRandom(st, periodId, opts) {
    const o = opts || {};
    const rng = o.rng || Math.random;
    const pool0 = st.students.filter(s => s.periodId === periodId && s.active && !(o.excludeIds || []).includes(s.id));
    if (!pool0.length) return null;
    let ps = st.pickerState[periodId];
    if (!ps) ps = st.pickerState[periodId] = { remainingIds: [], noRepeat: false };
    if (o.noRepeat != null) ps.noRepeat = !!o.noRepeat;
    let pool = pool0;
    if (ps.noRepeat) {
      ps.remainingIds = ps.remainingIds.filter(id => pool0.some(s => s.id === id));
      if (!ps.remainingIds.length) ps.remainingIds = pool0.map(s => s.id); // everyone had a turn -> reset
      pool = pool0.filter(s => ps.remainingIds.includes(s.id));
    }
    const chosen = pool[Math.floor(rng() * pool.length)];
    if (ps.noRepeat) ps.remainingIds = ps.remainingIds.filter(id => id !== chosen.id);
    return chosen;
  }
  function resetPicker(st, periodId) { if (st.pickerState[periodId]) st.pickerState[periodId].remainingIds = []; }

  // ---------- goals ----------
  function setGoal(st, periodId, target) { st.goals[periodId] = target == null ? null : Math.max(1, target | 0); }

  // ---------- student-link snapshot (short keys; NO student names / notes / images) ----------
  function buildSnapshot(st, now) {
    const q = currentQuarter(st);
    const snap = {
      v: 1, y: st.settings.schoolYearLabel || "", q: q.label, at: Math.floor(now / 60000),
      p: st.periods.map(p => {
        const sow = squadOfWeek(st, p.id, now);
        return {
          n: p.name,
          s: periodStandings(st, p.id, now).map(r => ({
            n: r.name, av: r.squad.builtinAvatar, t: r.total, d: r.daily, w: r.weekly,
            st: r.streak, b: r.badges
          })),
          sow: sow ? sow.name : null,
          g: st.goals[p.id] ? { t: st.goals[p.id], c: periodStandings(st, p.id, now).reduce((t, r) => t + r.total, 0) } : null
        };
      }),
      champ: {
        cur: quarterChampion(st, now),
        top10: allTimeTop10(st).map(r => ({ n: r.name, p: r.period, q: r.quarter, t: r.total })),
        week: weeklyRace(st, now).slice(0, 10).map(r => ({ n: r.name, p: r.period, w: r.weekly }))
      }
    };
    return snap;
  }

  // ---------- compression + base64url (native streams; no libraries) ----------
  async function _pipe(bytes, stream) {
    const w = stream.writable.getWriter();
    w.write(bytes); w.close();
    return new Uint8Array(await new Response(stream.readable).arrayBuffer());
  }
  const _b64url = (bytes) => {
    let s = ""; for (const b of bytes) s += String.fromCharCode(b);
    return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  };
  const _unb64url = (str) => {
    const s = atob(str.replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(s, c => c.charCodeAt(0));
  };
  async function packJSON(obj) {
    const bytes = new TextEncoder().encode(JSON.stringify(obj));
    return _b64url(await _pipe(bytes, new CompressionStream("deflate-raw")));
  }
  async function unpackJSON(str) {
    const bytes = await _pipe(_unb64url(str), new DecompressionStream("deflate-raw"));
    return JSON.parse(new TextDecoder().decode(bytes));
  }
  const encodeSnapshot = (snap) => packJSON(snap);
  async function decodeSnapshot(str) {
    const snap = await unpackJSON(str);
    if (snap.v !== 1) throw new Error("This link was made by a newer version of Squad Points.");
    return snap;
  }

  // ---------- transfer code (all data except custom images) ----------
  const TRANSFER_PREFIX = "SQT1.";
  async function encodeTransfer(st) {
    const clean = JSON.parse(JSON.stringify(st));
    for (const sq of clean.squads) sq.imageKey = null; // images live in IndexedDB; use file backup for those
    return TRANSFER_PREFIX + await packJSON(clean);
  }
  async function decodeTransfer(code) {
    const c = String(code).trim();
    if (!c.startsWith(TRANSFER_PREFIX)) {
      if (/^[A-Za-z0-9_-]{40,}$/.test(c)) throw new Error("That looks like a student share link, not a Transfer Code. In Squad Points go to Setup → Move to another device.");
      throw new Error("That doesn't look like a Squad Points Transfer Code.");
    }
    const st = await unpackJSON(c.slice(TRANSFER_PREFIX.length));
    if (!st.periods || !st.awards || !st.quarters) throw new Error("Transfer Code is incomplete — copy the WHOLE code and try again.");
    return st;
  }

  return {
    AV_COUNT, BADGES, STORE_KEY,
    uid, save, load, newState, currentQuarter,
    addPeriod, renamePeriod, parseRoster, addStudents,
    startQuarter, addSquad, renameSquad, setSquadAvatar, assignStudent, unassignStudent, currentSquads,
    award, undoAward, dayKey, weekStart,
    squadTotal, squadDaily, squadWeekly, streak, periodStandings,
    quarterChampion, allTimeTop10, weeklyRace, squadOfWeek, badges,
    pickRandom, resetPicker, setGoal,
    buildSnapshot, encodeSnapshot, decodeSnapshot, encodeTransfer, decodeTransfer
  };
})();
if (typeof globalThis !== "undefined") globalThis.SP = SP;
/*==CORE-END==*/
</script>

<script>

async function runCoreTests(SP) {
  const log = []; let passed = 0, failed = 0;
  const ok = (cond, name) => { cond ? passed++ : failed++; log.push((cond ? "PASS  " : "FAIL  ") + name); };
  const eq = (a, b, name) => ok(JSON.stringify(a) === JSON.stringify(b), name + "  [" + JSON.stringify(a) + " == " + JSON.stringify(b) + "]");
  const T = (y, mo, d, h, mi) => new Date(y, mo - 1, d, h || 12, mi || 0).getTime(); // local time

  // --- roster parser ---
  const names = SP.parseRoster("1. Smith, Ava\n2) Jones, Ben\nCara Diaz\n\n  cara diaz \nDan\tElla Fox\n3 - Grey, Hank");
  eq(names, ["Ava Smith", "Ben Jones", "Cara Diaz", "Dan", "Ella Fox", "Hank Grey"], "roster: numbering, Last-First swap, tabs, dedupe, blanks");
  eq(SP.parseRoster("12345\n---"), [], "roster: junk lines dropped");

  // --- state scenario: Q1, one period, 4 squads ---
  const MON = T(2026, 9, 14), TUE = T(2026, 9, 15), WED = T(2026, 9, 16), THU = T(2026, 9, 17), FRI = T(2026, 9, 18);
  const st = SP.newState(T(2026, 8, 3));
  st.settings.schoolYearLabel = "2026-27";
  const p3 = SP.addPeriod(st, "3rd Period");
  const p4 = SP.addPeriod(st, "4th Period");
  const r = SP.addStudents(st, p3.id, SP.parseRoster("Ava Smith\nBen Jones\nCara Diaz\nDan Lee\nElla Fox\nHank Grey\nIvy Moss\nJon Park"));
  eq(r.added.length, 8, "addStudents: 8 added");
  eq(SP.addStudents(st, p3.id, ["ava smith"]).skipped.length, 1, "addStudents: case-insensitive dedupe");

  const A = SP.addSquad(st, p3.id, "Da Niches"), B = SP.addSquad(st, p3.id, "Allergy Alphas"),
        C = SP.addSquad(st, p3.id, "Men of Culture"), D = SP.addSquad(st, p3.id, "Bucketeers");
  const X = SP.addSquad(st, p4.id, "Lord Farquads");
  const ids = st.students.filter(s => s.periodId === p3.id).map(s => s.id);
  SP.assignStudent(st, A.id, ids[0]); SP.assignStudent(st, A.id, ids[1]);
  SP.assignStudent(st, B.id, ids[0]); // steals Ava from A
  eq(A.memberIds.length, 1, "assign: student moved out of old squad");
  eq(B.memberIds.length, 1, "assign: student landed in new squad");

  // --- award validation ---
  let threw = 0;
  for (const bad of [0, -3, 2.5, "x"]) { try { SP.award(st, A.id, bad, MON); } catch { threw++; } }
  eq(threw, 4, "award: rejects 0, negative, fraction, non-number");

  // --- ledger + daily/weekly/total math ---
  SP.award(st, A.id, 5, MON); SP.award(st, A.id, 3, MON);
  SP.award(st, B.id, 4, MON);
  SP.award(st, A.id, 2, TUE);
  SP.award(st, B.id, 5, WED); SP.award(st, C.id, 1, WED);
  SP.award(st, X.id, 5, WED);
  const SUN_LATE = T(2026, 9, 20, 23, 59), NEXT_MON = T(2026, 9, 21, 0, 1);
  SP.award(st, C.id, 4, SUN_LATE);   // still last week
  SP.award(st, C.id, 5, NEXT_MON);   // new week

  eq(SP.squadTotal(st, A.id), 10, "total: A = 10");
  eq(SP.squadDaily(st, A.id, MON), 8, "daily: A on Monday = 8");
  eq(SP.squadDaily(st, A.id, TUE), 2, "daily: A on Tuesday = 2");
  eq(SP.squadWeekly(st, A.id, FRI), 10, "weekly: A week-1 = 10");
  eq(SP.squadWeekly(st, C.id, FRI), 5, "weekly: C week-1 = 5 (incl. Sunday 23:59)");
  eq(SP.squadWeekly(st, C.id, NEXT_MON), 5, "weekly: resets Monday (C week-2 = 5)");
  eq(SP.squadTotal(st, C.id), 10, "quarter total persists across weeks (C = 10)");

  // --- standings + ranks (ties) ---
  const rows = SP.periodStandings(st, p3.id, NEXT_MON);
  eq(rows.map(r => r.name), ["Allergy Alphas", "Bucketeers", "Da Niches", "Men of Culture"].sort((a, b) => {
    const t = { "Da Niches": 10, "Allergy Alphas": 9, "Men of Culture": 10, "Bucketeers": 0 };
    return t[b] - t[a] || a.localeCompare(b);
  }), "standings: sorted by total, ties alphabetical");
  eq(rows[0].rank, 1, "rank: co-leaders rank 1");
  eq(rows[1].rank, 1, "rank: tie shares rank 1");
  eq(rows[2].rank, 3, "rank: next rank skips (3)");

  // --- streak: MON,TUE class days for A... A earned MON+TUE, missed WED (class day), so streak from WED back = 0 chain broken ---
  eq(SP.streak(st, A.id, WED), 0, "streak: broken on missed class day");
  eq(SP.streak(st, B.id, WED), 1, "streak: B earned on latest class day only after gap (TUE missed)");
  // build a clean 3-day streak for D
  SP.award(st, D.id, 1, WED); SP.award(st, D.id, 1, T(2026, 9, 20, 23, 58)); SP.award(st, D.id, 1, NEXT_MON);
  eq(SP.streak(st, D.id, NEXT_MON), 3, "streak: 3 consecutive class days");

  // --- champion / weekly race / squad of week ---
  const champ = SP.quarterChampion(st, NEXT_MON);
  ok(champ && champ.total === 10, "champion: total 10 from 3rd Period");
  const race = SP.weeklyRace(st, FRI);
  eq(race[0].weekly, 10, "weekly race: leader = 10");
  ok(race.some(r => r.period === "4th Period"), "weekly race: includes other periods");
  const sow = SP.squadOfWeek(st, p3.id, NEXT_MON);
  ok(sow && sow.points >= 5, "squad of week: previous week's top squad found");

  // --- picker: no-repeat exhausts everyone before repeating ---
  let seed = 42; const rng = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const seen = new Set(); const p3count = st.students.filter(s => s.periodId === p3.id && s.active).length;
  for (let i = 0; i < p3count; i++) seen.add(SP.pickRandom(st, p3.id, { noRepeat: true, rng }).id);
  eq(seen.size, p3count, "picker: all " + p3count + " students picked once before any repeat");
  ok(SP.pickRandom(st, p3.id, { noRepeat: true, rng }) !== null, "picker: auto-resets after everyone had a turn");

  // --- undo ---
  const big = SP.award(st, D.id, 50, NEXT_MON);
  eq(SP.squadTotal(st, D.id), 53, "custom award: +50 accepted");
  SP.undoAward(st, big.id);
  eq(SP.squadTotal(st, D.id), 3, "undo: award fully reversed");

  // --- badges ---
  for (let i = 0; i < 25; i++) SP.award(st, A.id, 5, NEXT_MON); // A -> 135
  const ab = SP.badges(st, A.id, NEXT_MON);
  ok(ab.includes("club100"), "badge: Century Club at 100+");
  ok(ab.includes("record_breaker"), "badge: record breaker when beating best other total");
  ok(!SP.badges(st, D.id, NEXT_MON).includes("club100"), "badge: not given below threshold");

  // --- new quarter: archive + fresh start + all-time records ---
  SP.startQuarter(st, "Q2 2026-27", T(2026, 10, 26));
  eq(SP.currentSquads(st, p3.id).length, 0, "new quarter: no squads yet");
  eq(st.students.filter(s => s.periodId === p3.id && s.active).length, 8, "new quarter: roster kept");
  const top = SP.allTimeTop10(st);
  eq(top[0].total, 135, "all-time: Q1 record preserved");
  eq(top[0].quarter, "Q1", "all-time: labeled with quarter");
  const E = SP.addSquad(st, p3.id, "New Kids");
  SP.award(st, E.id, 5, T(2026, 10, 27));
  eq(SP.periodStandings(st, p3.id, T(2026, 10, 27)).length, 1, "new quarter: standings only show new squads");
  ok(SP.allTimeTop10(st).some(r => r.name === "New Kids"), "all-time: current-quarter squads compete live");

  // --- snapshot: shape + privacy ---
  const snap = SP.buildSnapshot(st, T(2026, 10, 27));
  eq(snap.v, 1, "snapshot: versioned");
  eq(snap.p.length, 2, "snapshot: all periods included");
  const js = JSON.stringify(snap);
  ok(!js.includes("Ava") && !js.includes("Smith"), "snapshot: NO student names leak");
  ok(js.includes("Da Niches"), "snapshot: squad names present (records)");
  ok(snap.champ.top10[0].t === 135, "snapshot: all-time record rides along");

  // --- encode/decode round-trips (needs CompressionStream) ---
  if (typeof CompressionStream !== "undefined") {
    const enc = await SP.encodeSnapshot(snap);
    ok(/^[A-Za-z0-9_-]+$/.test(enc), "encode: URL-safe base64");
    ok(enc.length < 8192, "encode: snapshot fits link budget (" + enc.length + " chars)");
    const back = await SP.decodeSnapshot(enc);
    eq(back.champ.top10[0].t, 135, "decode: snapshot round-trip intact");

    const code = await SP.encodeTransfer(st);
    ok(code.startsWith("SQT1."), "transfer: prefixed");
    const st2 = await SP.decodeTransfer(code);
    eq(st2.awards.length, st.awards.length, "transfer: full ledger survives (" + st.awards.length + " awards)");
    eq(SP.squadTotal(st2, A.id), 135, "transfer: totals recompute identically on new device");
    let msg = "";
    try { await SP.decodeTransfer(enc); } catch (e) { msg = e.message; }
    ok(msg.includes("share link"), "transfer: pasting a share link explains the difference");
  } else {
    log.push("SKIP  CompressionStream not available in this runtime — verify encode/decode in browser");
  }

  return { passed, failed, log };
}

/*==TEST-END==*/

// 20 original code-drawn "creature" avatars. Deterministic per index. No external art.
const AV_COUNT_UI = SP.AV_COUNT;
function avatarSVG(i) {
  i = ((i % AV_COUNT_UI) + AV_COUNT_UI) % AV_COUNT_UI;
  const h = Math.round((i * 360) / AV_COUNT_UI);
  const main = `hsl(${h} 68% 55%)`, dark = `hsl(${h} 65% 34%)`, pale = `hsl(${h} 70% 93%)`, belly = `hsl(${h} 70% 82%)`;
  const shape = i % 4, feat = i % 5, eyes = (i % 3) + 1, mouth = i % 3;
  let s = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Squad avatar">`;
  s += `<rect x="2" y="2" width="96" height="96" rx="20" fill="${pale}"/>`;
  // top features (drawn behind body)
  if (feat === 1) s += `<path d="M32 30 L38 12 L46 30 Z" fill="${dark}"/><path d="M68 30 L62 12 L54 30 Z" fill="${dark}"/>`; // horns
  if (feat === 2) s += `<ellipse cx="30" cy="30" rx="12" ry="16" fill="${dark}"/><ellipse cx="70" cy="30" rx="12" ry="16" fill="${dark}"/>`; // ears
  if (feat === 3) s += `<line x1="40" y1="26" x2="34" y2="10" stroke="${dark}" stroke-width="3"/><circle cx="33" cy="8" r="4" fill="${dark}"/><line x1="60" y1="26" x2="66" y2="10" stroke="${dark}" stroke-width="3"/><circle cx="67" cy="8" r="4" fill="${dark}"/>`; // antennae
  if (feat === 4) s += `<path d="M30 28 L36 14 L42 28 Z" fill="${dark}"/><path d="M44 26 L50 10 L56 26 Z" fill="${dark}"/><path d="M58 28 L64 14 L70 28 Z" fill="${dark}"/>`; // spikes
  // body
  if (shape === 0) s += `<rect x="24" y="26" width="52" height="54" rx="20" fill="${main}"/>`;
  else if (shape === 1) s += `<circle cx="50" cy="54" r="28" fill="${main}"/>`;
  else if (shape === 2) s += `<rect x="30" y="22" width="40" height="60" rx="18" fill="${main}"/>`;
  else s += `<rect x="20" y="32" width="60" height="46" rx="20" fill="${main}"/>`;
  s += `<ellipse cx="50" cy="64" rx="18" ry="14" fill="${belly}" opacity=".85"/>`;
  // eyes
  const ex = eyes === 1 ? [50] : eyes === 2 ? [40, 60] : [37, 50, 63];
  const ey = eyes === 3 ? 46 : 48;
  for (const x of ex) { s += `<circle cx="${x}" cy="${ey}" r="8" fill="#fff"/><circle cx="${x}" cy="${ey + 1}" r="3.6" fill="#1d2433"/><circle cx="${x + 1.5}" cy="${ey - 1.5}" r="1.3" fill="#fff"/>`; }
  // mouth
  if (mouth === 0) s += `<path d="M40 68 Q50 78 60 68" fill="none" stroke="${dark}" stroke-width="3" stroke-linecap="round"/>`;
  else if (mouth === 1) s += `<ellipse cx="50" cy="70" rx="8" ry="6" fill="${dark}"/><ellipse cx="50" cy="71" rx="4" ry="3" fill="#ffb4b4"/>`;
  else s += `<rect x="42" y="66" width="16" height="8" rx="2" fill="#fff" stroke="${dark}" stroke-width="2"/><line x1="50" y1="66" x2="50" y2="74" stroke="${dark}" stroke-width="1.5"/>`;
  s += `</svg>`;
  return s;
}

// Custom squad images/GIFs live in IndexedDB (too big for localStorage; never leave the device).
const IMGDB = {
  _db: null,
  open() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise((res, rej) => {
      const r = indexedDB.open("squadPointsImages", 1);
      r.onupgradeneeded = () => r.result.createObjectStore("img");
      r.onsuccess = () => { this._db = r.result; res(r.result); };
      r.onerror = () => rej(r.error);
    });
  },
  async put(key, blob) { const db = await this.open(); return new Promise((res, rej) => { const t = db.transaction("img", "readwrite"); t.objectStore("img").put(blob, key); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); },
  async get(key) { const db = await this.open(); return new Promise((res, rej) => { const t = db.transaction("img", "readonly"); const q = t.objectStore("img").get(key); q.onsuccess = () => res(q.result || null); q.onerror = () => rej(q.error); }); },
  async del(key) { const db = await this.open(); return new Promise((res, rej) => { const t = db.transaction("img", "readwrite"); t.objectStore("img").delete(key); t.oncomplete = () => res(); t.onerror = () => rej(t.error); }); },
  async all() { const db = await this.open(); return new Promise((res, rej) => { const t = db.transaction("img", "readonly"); const store = t.objectStore("img"); const out = {}; const cur = store.openCursor(); cur.onsuccess = e => { const c = e.target.result; if (c) { out[c.key] = c.value; c.continue(); } else res(out); }; cur.onerror = () => rej(cur.error); }); }

  function confetti(n) {

    const cols = ["#5b5bd6", "#16a34a", "#f59e0b", "#e0447f", "#22c1c3", "#f6d743"];
    for (let i = 0; i < n; i++) cparts.push({ x: innerWidth / 2 + (Math.random() - .5) * 120, y: innerHeight / 3, vx: (Math.random() - .5) * 9, vy: -Math.random() * 12 - 4, g: .4 + Math.random() * .2, c: cols[i % cols.length], s: 5 + Math.random() * 6, r: Math.random() * 6, vr: (Math.random() - .5) * .5, life: 90 });
    if (!craf) craf = requestAnimationFrame(stepConfetti);
  }
  function stepConfetti() {
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    cparts = cparts.filter(p => p.life-- > 0 && p.y < innerHeight + 20);
    for (const p of cparts) { p.vy += p.g; p.x += p.vx; p.y += p.vy; p.r += p.vr; cctx.save(); cctx.translate(p.x, p.y); cctx.rotate(p.r); cctx.fillStyle = p.c; cctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s); cctx.restore(); }

    const updateCount = () => {
      const noRep = $("#rNo").checked;

      persist(); updateCount();
      if (!chosen) { big.textContent = "Nobody left!"; return; }
      const pool = roster.filter(s => !exSet.has(s.id));

      $("#rGo").style.display = "none"; $("#rAgain").style.display = "";
    };

  function spin(names, title, ignored) {
    const o = fullscreen(`<div class="ovl"><div class="panel rand"><button class="x" data-close>✕</button>
      <h2>${ic("shuffle", 20)} ${esc(title)}</h2><div class="big" id="sBig">—</div>
      <div class="row" style="justify-content:center"><button class="btn" id="sGo">Pick</button></div></div></div>`, "");
    const root = o.firstChild; root.addEventListener("mousedown", e => { if (e.target === root) close(o); });
    o.querySelector("[data-close]").onclick = () => close(o);

    $("#sGo").onclick = go;
  }
  function spinInto(elm, pool, finalName, done) {
    let ticks = 0, delay = 45;
    const total = 20 + Math.floor(Math.random() * 6);
    elm.classList.remove("landed");
    const step = () => {
      if (!elm.isConnected) return;              // dialog closed mid-spin
      if (++ticks >= total) { elm.textContent = finalName; elm.classList.add("landed"); done && done(); return; }
      elm.textContent = pool[Math.floor(Math.random() * pool.length)] || finalName;
      delay = Math.min(delay * 1.14, 240);       // decelerate like a slot machine
      setTimeout(step, delay);
    };
    step();
  }

  async function exportBackup() {
    const images = {};
    const all = await IMGDB.all();
    for (const [k, blob] of Object.entries(all)) images[k] = await blobToDataURL(blob);
    const payload = { format: "squadPoints-backup", v: 1, at: now(), state: st, images };
    const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
    const a = el("a"); a.href = URL.createObjectURL(blob); a.download = "squad-points-backup.json"; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    st.settings.lastBackupAt = now(); persist();
    toast("Backup downloaded.");
  }
  function importBackup(setupOverlay) {
    const inp = el("input"); inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = async () => {
      const f = inp.files[0]; if (!f) return;
      try {
        const data = JSON.parse(await f.text());
        if (data.format !== "squadPoints-backup" || !data.state) throw new Error("Not a Squad Points backup file.");
        if (!confirm("Restore this backup? It replaces the data on this device.")) return;
        st = data.state; activePeriodId = st.periods[0] ? st.periods[0].id : null;
        if (data.images) for (const [k, durl] of Object.entries(data.images)) { dropURL(k); await IMGDB.put(k, await dataURLToBlob(durl)); }
        persist(); close(setupOverlay); render(); toast("Backup restored.");
      } catch (e) { alert("Couldn't import: " + e.message); }
    };
    inp.click();
  }
  const blobToDataURL = blob => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });

    else if (act === "standings") openStandings();
    else if (act === "share") openShare();
    else if (act === "projector") openProjector();
    else if (act === "timer") openTimer();
    else if (act === "setup") openSetup();
  });
  $("#btnStandings2").onclick = () => openStandings();
  $("#btnSetup2").onclick = () => openSetup();

  render();
  window._SPapp = { get st() { return st; }, render, openSetup, openShare, avatarSVG };
})();
/*==APP-END==*/
</script>
