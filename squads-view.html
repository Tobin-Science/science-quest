<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Points — Standings</title>
<style>
  :root{ --ink:#1d2433; --mut:#5b6579; --bg:#eef1f9; --card:#fff; --brand:#5b5bd6; --brand2:#4747c2;
         --green:#16a34a; --gold:#f59e0b; --line:#e3e7f2; }
  *{box-sizing:border-box}
  body{font-family:system-ui,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;
       min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--card);border-bottom:1px solid var(--line);padding:.8rem 1rem;text-align:center}
  header h1{margin:0;font-size:1.25rem}
  .asof{color:var(--mut);font-size:.85rem;margin-top:.2rem}
  main{flex:1;max-width:1050px;width:100%;margin:0 auto;padding:1rem}
  .tabs{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:.9rem}
  .tabs button{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:.5rem 1.1rem;
               font-size:.95rem;font-weight:600;color:var(--mut);cursor:pointer}
  .tabs button.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .picker{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:.9rem}
  .picker button{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:.4rem .9rem;font-size:.9rem;cursor:pointer}
  .picker button.on{background:#eef;border-color:var(--brand);color:var(--brand2);font-weight:700}
  .subtabs{display:flex;gap:.4rem;justify-content:center;margin-bottom:.8rem}
  .subtabs button{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:.3rem .8rem;font-size:.82rem;cursor:pointer}
  .subtabs button.on{background:var(--gold);border-color:var(--gold);color:#fff}
  .rec{background:#fff8e6;border:1px solid #f3e2ac;border-radius:12px;padding:.7rem .9rem;margin-bottom:1rem;text-align:center;font-size:1rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
  .sq{background:var(--card);border-radius:16px;padding:1rem .8rem .8rem;position:relative;text-align:center;
      border:1px solid var(--line);box-shadow:0 2px 8px rgba(20,30,60,.06)}
  .sq.first{outline:3px solid var(--gold);box-shadow:0 0 18px #f59e0b44}
  .sq .pts{position:absolute;top:-11px;right:-8px;background:var(--green);color:#fff;border-radius:999px;
           min-width:42px;padding:.3rem .5rem;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .sq .medal{position:absolute;top:-11px;left:-8px;font-size:1.4rem}
  .sq .flame{position:absolute;top:30px;right:6px;font-size:.9rem}
  .sq .avatar{width:80px;height:80px;margin:0 auto .4rem} .sq .avatar svg,.sq .avatar img{width:100%;height:100%}
  .sq .nm{font-weight:700;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:2.4em}
  .sq .meta{margin-top:.3rem;font-size:.8rem;color:var(--mut)}
  .sq .bdg{margin-top:.25rem;min-height:1.1em}
  table.lb{width:100%;border-collapse:collapse;font-size:.95rem;background:var(--card);border-radius:12px;overflow:hidden}
  table.lb td,table.lb th{padding:.55rem .6rem;text-align:left;border-bottom:1px solid var(--line)}
  table.lb td.r{text-align:right;font-weight:700}
  h3{margin:1.3rem 0 .5rem}
  .err{max-width:460px;margin:3rem auto;text-align:center;background:var(--card);border-radius:16px;padding:2rem;border:1px solid var(--line)}
  footer{padding:1rem;text-align:center}
  footer a{color:var(--brand2);font-size:.85rem;text-decoration:none;background:#fff;border:1px solid var(--line);
           border-radius:999px;padding:.4rem .9rem;display:inline-block}
</style>
</head>
<body>
<header>
  <h1>🏆 Squad Points</h1>
  <div class="asof" id="asof"></div>
</header>
<main id="main"><p class="muted" style="text-align:center">Loading standings…</p></main>
<footer><a href="https://tobinscience.com" target="_blank" rel="noopener">Find more great resources at TobinScience.com →</a></footer>

<script>
"use strict";
// ---- avatar (identical art to the teacher app) ----
const AV_COUNT = 20;
function avatarSVG(i){
  i=((i%AV_COUNT)+AV_COUNT)%AV_COUNT;
  const h=Math.round(i*360/AV_COUNT), main=`hsl(${h} 68% 55%)`,dark=`hsl(${h} 65% 34%)`,pale=`hsl(${h} 70% 93%)`,belly=`hsl(${h} 70% 82%)`;
  const shape=i%4,feat=i%5,eyes=(i%3)+1,mouth=i%3;
  let s=`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="96" height="96" rx="20" fill="${pale}"/>`;
  if(feat===1)s+=`<path d="M32 30 L38 12 L46 30 Z" fill="${dark}"/><path d="M68 30 L62 12 L54 30 Z" fill="${dark}"/>`;
  if(feat===2)s+=`<ellipse cx="30" cy="30" rx="12" ry="16" fill="${dark}"/><ellipse cx="70" cy="30" rx="12" ry="16" fill="${dark}"/>`;
  if(feat===3)s+=`<line x1="40" y1="26" x2="34" y2="10" stroke="${dark}" stroke-width="3"/><circle cx="33" cy="8" r="4" fill="${dark}"/><line x1="60" y1="26" x2="66" y2="10" stroke="${dark}" stroke-width="3"/><circle cx="67" cy="8" r="4" fill="${dark}"/>`;
  if(feat===4)s+=`<path d="M30 28 L36 14 L42 28 Z" fill="${dark}"/><path d="M44 26 L50 10 L56 26 Z" fill="${dark}"/><path d="M58 28 L64 14 L70 28 Z" fill="${dark}"/>`;
  if(shape===0)s+=`<rect x="24" y="26" width="52" height="54" rx="20" fill="${main}"/>`;
  else if(shape===1)s+=`<circle cx="50" cy="54" r="28" fill="${main}"/>`;
  else if(shape===2)s+=`<rect x="30" y="22" width="40" height="60" rx="18" fill="${main}"/>`;
  else s+=`<rect x="20" y="32" width="60" height="46" rx="20" fill="${main}"/>`;
  s+=`<ellipse cx="50" cy="64" rx="18" ry="14" fill="${belly}" opacity=".85"/>`;
  const ex=eyes===1?[50]:eyes===2?[40,60]:[37,50,63], ey=eyes===3?46:48;
  for(const x of ex)s+=`<circle cx="${x}" cy="${ey}" r="8" fill="#fff"/><circle cx="${x}" cy="${ey+1}" r="3.6" fill="#1d2433"/><circle cx="${x+1.5}" cy="${ey-1.5}" r="1.3" fill="#fff"/>`;
  if(mouth===0)s+=`<path d="M40 68 Q50 78 60 68" fill="none" stroke="${dark}" stroke-width="3" stroke-linecap="round"/>`;
  else if(mouth===1)s+=`<ellipse cx="50" cy="70" rx="8" ry="6" fill="${dark}"/><ellipse cx="50" cy="71" rx="4" ry="3" fill="#ffb4b4"/>`;
  else s+=`<rect x="42" y="66" width="16" height="8" rx="2" fill="#fff" stroke="${dark}" stroke-width="2"/><line x1="50" y1="66" x2="50" y2="74" stroke="${dark}" stroke-width="1.5"/>`;
  return s+`</svg>`;
}
const BADGE_ICON = { first_points:"🌟", club100:"💯", club250:"🚀", club500:"👑", hot_streak:"🔥", daily_double:"⚡", comeback:"📈", record_breaker:"🏅" };
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ---- decode snapshot from URL hash ----
async function unpack(str){
  const bin = atob(str.replace(/-/g,"+").replace(/_/g,"/"));
  const bytes = Uint8Array.from(bin, c=>c.charCodeAt(0));
  const ds = new DecompressionStream("deflate-raw");
  const w = ds.writable.getWriter(); w.write(bytes); w.close();
  const buf = new Uint8Array(await new Response(ds.readable).arrayBuffer());
  return JSON.parse(new TextDecoder().decode(buf));
}

let snap=null, curPeriod=0, tab="class", classSub="t";

async function boot(){
  const m = location.hash.match(/[#&]s=([^&]+)/);
  if(!m){ showErr("No standings in this link. Ask your teacher for the current Squad Points link."); return; }
  try{ snap = await unpack(m[1]); }
  catch(e){ showErr("This link got scrambled on the way here. Ask your teacher for a fresh Squad Points link."); return; }
  if(!snap || snap.v!==1){ showErr("This link was made by a different version of Squad Points. Ask your teacher for a fresh link."); return; }
  const d = new Date(snap.at*60000);
  document.getElementById("asof").textContent = "Standings as of " + d.toLocaleString() + (snap.y?` · ${snap.y}`:"") + ` · ${snap.q||""}`;
  render();
}
function showErr(msg){ document.getElementById("main").innerHTML = `<div class="err"><h2>🔌 ${esc(msg)}</h2></div>`; }

function render(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="tabs">
    <button data-tab="class" class="${tab==='class'?'on':''}">My Class</button>
    <button data-tab="champ" class="${tab==='champ'?'on':''}">Champions</button>
    <button data-tab="week" class="${tab==='week'?'on':''}">This Week</button>
  </div><div id="tabBody"></div>`;
  main.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
  const body = document.getElementById("tabBody");
  if(tab==="class") renderClass(body);
  else if(tab==="champ") renderChamp(body);
  else renderWeek(body);
}

function cardHTML(sq, rank, key){
  const medal = rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"";
  const badges = (sq.b||[]).map(b=>BADGE_ICON[b]||"").join("");
  const val = key==="t"?sq.t:key==="d"?sq.d:sq.w;
  return `<div class="sq ${rank===1?'first':''}">
    <div class="pts">${val}</div>${medal?`<div class="medal">${medal}</div>`:""}
    ${sq.st>=3?`<div class="flame">🔥${sq.st}</div>`:""}
    <div class="avatar">${avatarSVG(sq.av)}</div>
    <div class="nm" title="${esc(sq.n)}">${esc(sq.n)}</div>
    <div class="meta">Total ${sq.t} · Today ${sq.d} · Week ${sq.w}</div>
    <div class="bdg">${badges}</div></div>`;
}
function renderClass(body){
  if(!snap.p.length){ body.innerHTML=`<p class="muted" style="text-align:center">No classes yet.</p>`; return; }
  if(curPeriod>=snap.p.length) curPeriod=0;
  let html = `<div class="picker">` + snap.p.map((p,i)=>`<button data-p="${i}" class="${i===curPeriod?'on':''}">${esc(p.n)}</button>`).join("") + `</div>`;
  html += `<div class="subtabs">
    <button data-sub="t" class="${classSub==='t'?'on':''}">Quarter</button>
    <button data-sub="d" class="${classSub==='d'?'on':''}">Today</button>
    <button data-sub="w" class="${classSub==='w'?'on':''}">This Week</button></div>`;
  const p = snap.p[curPeriod];
  if(p.sow) html += `<div class="rec">👑 Squad of the Week: <b>${esc(p.sow)}</b></div>`;
  if(p.g){ const pct=Math.min(100,Math.round(p.g.c/p.g.t*100)); html += `<div class="rec">🎯 Class goal: ${p.g.c} / ${p.g.t} pts (${pct}%)</div>`; }
  const key = classSub;
  const rows = p.s.slice().sort((a,b)=> (b[key]-a[key]) || a.n.localeCompare(b.n));
  html += `<div class="grid">` + rows.map((sq,i)=>cardHTML(sq, 1+rows.filter(x=>x[key]>sq[key]).length, key)).join("") + `</div>`;
  body.innerHTML = html;
  body.querySelectorAll(".picker button").forEach(b=>b.onclick=()=>{curPeriod=+b.dataset.p;render();});
  body.querySelectorAll(".subtabs button").forEach(b=>b.onclick=()=>{classSub=b.dataset.sub;render();});
}
function renderChamp(body){
  const c = snap.champ||{};
  let html = "";
  if(c.cur) html += `<div class="rec">👑 <b>Quarter Champion:</b> ${esc(c.cur.name)} — ${esc(c.cur.period)} — ${c.cur.total} pts</div>`;
  html += `<h3>🏅 All-Time Records (highest quarter totals ever)</h3>`;
  html += (c.top10&&c.top10.length) ? `<table class="lb"><tr><th></th><th>Squad</th><th>When</th><th style="text-align:right">Pts</th></tr>` +
    c.top10.map((r,i)=>`<tr><td>${["🥇","🥈","🥉"][i]||(i+1)}</td><td>${esc(r.n)}</td><td class="muted">${esc(r.p)} · ${esc(r.q)}</td><td class="r">${r.t}</td></tr>`).join("") + `</table>`
    : `<p class="muted">No records yet.</p>`;
  body.innerHTML = html;
}
function renderWeek(body){
  const w = (snap.champ&&snap.champ.week)||[];
  let html = `<h3>🔥 This Week's Race (all classes)</h3><p class="muted" style="margin-top:-.3rem">Anyone can win a week!</p>`;
  html += w.length ? `<table class="lb"><tr><th></th><th>Squad</th><th>Class</th><th style="text-align:right">Pts</th></tr>` +
    w.map((r,i)=>`<tr><td>${["🥇","🥈","🥉"][i]||(i+1)}</td><td>${esc(r.n)}</td><td class="muted">${esc(r.p)}</td><td class="r">${r.w}</td></tr>`).join("") + `</table>`
    : `<p class="muted">No points yet this week.</p>`;
  body.innerHTML = html;
}
addEventListener("hashchange", boot);
boot();
</script>
</body>
</html>
